name: Forex Bot Scheduler

on:
  schedule:
    - cron: '0 5 1 * *'
    - cron: '0 5 * * 0'
    - cron: '*/5 * * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: "Which job(s) to run manually"
        required: true
        default: "all"
        type: choice
        options:
          - all
          - monthly-sync
          - dispatch

permissions:
  contents: write

jobs:
  test-version2:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest
      - name: Run tests
        run: pytest -q tests/test_version2.py tests/test_scraper.py

  run-monthly-sync:
    needs: test-version2
    if: github.event.schedule == '0 5 1 * *' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'monthly-sync'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run monthly sync
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIT_AUTO_COMMIT: 'true'
        run: python forex_bot_v2/scheduler.py monthly-sync

  run-dispatcher:
    needs: test-version2
    if: github.event.schedule == '*/5 * * * *' || (github.event_name == 'workflow_dispatch' && (inputs.mode == 'all' || inputs.mode == 'dispatch'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      - name: Run dispatcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          GIT_AUTO_COMMIT: 'true'
        run: python forex_bot_v2/scheduler.py dispatch
